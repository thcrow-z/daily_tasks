function focusDayOrder(d) {
  const diff = Math.round((stripTime(d) - stripTime(today)) / MS_DAY);
  return diff >= 0 ? diff : 7 + diff;
}
function getDaysForCurrentView() {
  return getWeekDays()
    .filter(d => settings.visibleDays.includes(d.getDay()))
    .sort((a, b) => focusDayOrder(a) - focusDayOrder(b));
}

/* ====================== Mount ====================== */
function mount() {
  materializeRecurring();
  syncDateHero();
  const app = document.getElementById('app');
  const days = getDaysForCurrentView();
  if (!days.length && !settings.onlyNext7 && !['undated', 'week'].includes(settings.viewMode)) {
    app.innerHTML = `
      <div class="empty-state">
        <strong>No days selected</strong>
        <span>Open settings from the + menu and pick the days you want to see.</span>
      </div>
    `;
  } else {
    const mainView = settings.onlyNext7
      ? nextSevenHTML()
      : settings.viewMode === 'agenda'
        ? agendaHTML(days)
        : settings.viewMode === 'week'
          ? weekPlanHTML(days.length ? days : getWeekDays())
        : settings.viewMode === 'undated'
          ? undatedHTML()
          : days.map(dayHTML).join('');
    app.innerHTML = mainView;
  }
  bindAppEvents();
  syncActionMenuState();
  syncShellColors();
}

/**
 * Tag the last visible section so its tone can extend through the
 * bottom FAB clearance — keeps the scroll content seamless with its
 * last day, without forcing the top status bar off the inbox tone.
 */
function syncShellColors() {
  const app = document.getElementById('app');
  if (!app) return;
  app.querySelectorAll('.last-section').forEach(el => el.classList.remove('last-section'));
  const sections = app.querySelectorAll('.day, .inbox, .agenda-view, .next7-view, .undated-view, .week-plan-view');
  const lastSection = sections[sections.length - 1];
  if (lastSection) lastSection.classList.add('last-section');
}

function syncActionMenuState() {
  const menu = document.getElementById('fab-menu');
  const undatedBtn = document.getElementById('menu-undated');
  const next7Btn = document.getElementById('menu-next-7');
  const badge = document.getElementById('inbox-badge');
  if (!menu) return;
  menu.querySelectorAll('button[data-view-mode]').forEach(btn => {
    const active = settings.viewMode === btn.dataset.viewMode && !settings.onlyNext7;
    btn.classList.toggle('on', active);
    btn.setAttribute('aria-checked', active ? 'true' : 'false');
  });
  if (next7Btn) {
    next7Btn.classList.toggle('on', settings.onlyNext7);
    next7Btn.setAttribute('aria-checked', settings.onlyNext7 ? 'true' : 'false');
  }
  if (undatedBtn && badge) {
    badge.textContent = String(Math.min(inbox.length, 99));
    undatedBtn.classList.toggle('has-items', inbox.length > 0);
  }
}

/* ====================== Surgical updates ====================== */
function updateDayMeta(key) {
  const dayEl = document.querySelector(`.day[data-key="${key}"]`);
  if (!dayEl) return;
  const list = getTaskRefsForDay(key).map(ref => ref.task);
  const total = list.length;
  const done = list.filter(t => t.done).length;
  const pending = pendingCount(list);
  const pct = total ? Math.round((done / total) * 100) : 0;
  const showDot = total > 0 && done === 0;
  const showProgress = total > 0 && done > 0 && done < total;
  dayEl.classList.toggle('empty-day', total === 0);
  dayEl.classList.toggle('show-dot', showDot);
  dayEl.classList.toggle('show-progress', showProgress);
  const fill = dayEl.querySelector('.day-progress-fill');
  if (fill) fill.style.width = pct + '%';
  const status = dayEl.querySelector('.day-status');
  if (status) status.textContent = dayStatusLabel(total, pending, parseDateKey(key));
}
function updateAgendaMeta(key) {
  const btn = document.querySelector(`.agenda-day[data-key="${key}"]`);
  if (!btn) return;
  btn.classList.toggle('has-tasks', getTaskRefsForDay(key).some(ref => !ref.task.done));
}

function toggleTask(key, id) {
  const ref = findTaskRef(key, id);
  const item = ref && ref.task;
  if (!item) return;
  item.done = !item.done;
  save(STORAGE.data, data);
  scheduleAutoBackup('toggle');
  document.querySelectorAll(`.task-item[data-origin-key="${key}"][data-id="${id}"] .task`).forEach(taskEl => {
    taskEl.classList.toggle('done', item.done);
  });
  document.querySelectorAll(`.task-item[data-origin-key="${key}"][data-id="${id}"]`).forEach(el => {
    el.classList.remove('micro-pop');
    void el.offsetWidth;
    el.classList.add('micro-pop');
  });
  showToast(item.done ? 'Done' : 'Back on the board', 1400);
  document.querySelectorAll(`.task-item[data-origin-key="${key}"][data-id="${id}"]`).forEach(el => updateDayMeta(el.dataset.key));
  document.querySelectorAll(`.task-item[data-origin-key="${key}"][data-id="${id}"]`).forEach(el => updateAgendaMeta(el.dataset.key));
}

function deleteTask(key, id) {
  const itemEls = Array.from(document.querySelectorAll(`.task-item[data-origin-key="${key}"][data-id="${id}"]`));
  if (!itemEls.length) return;
  itemEls.forEach(itemEl => itemEl.classList.add('exiting'));
  setTimeout(() => {
    itemEls.forEach(itemEl => itemEl.remove());
    removeTaskFromDay(key, id);
    save(STORAGE.data, data);
    scheduleAutoBackup('delete');
    mount();
  }, 280);
}

function addTask(key, text) {
  const t = createTask(text);
  if (!data[key]) data[key] = [];
  data[key].push(t);
  save(STORAGE.data, data);
  scheduleAutoBackup('add-task');
  // If day was empty, re-mount to remove empty placeholder
  const wasEmpty = data[key].length === 1;
  if (wasEmpty) {
    mount();
  } else {
    const tasksEl = document.querySelector(`.day[data-key="${key}"] .tasks`);
    if (tasksEl) {
      tasksEl.insertAdjacentHTML('beforeend', taskHTML(t, key));
      const newEl = tasksEl.lastElementChild;
      newEl.classList.add('entering');
      bindTaskEvents(newEl);
    }
    updateDayMeta(key);
  }
}

function createTask(text, extra = {}) {
  return Object.assign({ id: uid(), text, done: false, note: '' }, extra);
}

function addInboxTask(text) {
  inbox.unshift(createTask(text));
  save(STORAGE.inbox, inbox);
  mount();
  scheduleAutoBackup('inbox');
}

function commitInboxEdit(id, newText) {
  const item = inbox.find(t => t.id === id);
  if (!item) return;
  const txt = newText.trim();
  if (!txt) {
    deleteInboxTask(id);
    return;
  }
  item.text = txt;
  save(STORAGE.inbox, inbox);
}

function deleteInboxTask(id) {
  inbox = inbox.filter(t => t.id !== id);
  save(STORAGE.inbox, inbox);
  mount();
}

function moveInboxTask(id, targetKey) {
  const idx = inbox.findIndex(t => t.id === id);
  if (idx < 0) return;
  const task = inbox.splice(idx, 1)[0];
  if (!data[targetKey]) data[targetKey] = [];
  data[targetKey].push(task);
  save(STORAGE.inbox, inbox);
  save(STORAGE.data, data);
  mount();
  scheduleAutoBackup('inbox-move');
}

function commitEdit(key, id, newText) {
  const ref = findTaskRef(key, id);
  const item = ref && ref.task;
  if (!item) return;
  const txt = newText.trim();
  if (!txt) { deleteTask(key, id); return; }
  item.text = txt;
  save(STORAGE.data, data);
  scheduleAutoBackup('edit');
}

function commitNoteEdit(key, id, newNote) {
  const ref = findTaskRef(key, id);
  const item = ref && ref.task;
  if (!item) return;
  item.note = newNote.trim();
  save(STORAGE.data, data);
  scheduleAutoBackup('note');
  document.querySelectorAll(`.task-item[data-origin-key="${key}"][data-id="${id}"]`).forEach(itemEl => {
    itemEl.classList.toggle('has-note', !!item.note);
  });
}

function toggleNoteEditor(key, id) {
  const itemEl = document.querySelector(`.task-item[data-origin-key="${key}"][data-id="${id}"]`);
  if (!itemEl) return;
  const noteEl = itemEl.querySelector('.task-note');
  if (!noteEl) return;
  if (itemEl.classList.contains('has-note')) {
    // Note exists: focus to edit
    noteEl.focus();
    placeCaretAtEnd(noteEl);
  } else {
    noteEl.classList.add('editing');
    noteEl.focus();
    placeCaretAtEnd(noteEl);
  }
}

function toggleMetaEditor(key, id) {
  openMetaEditor(key, id);
}

function commitTaskMeta(key, id, patch) {
  const ref = findTaskRef(key, id);
  const item = ref && ref.task;
  if (!item) return;
  Object.assign(item, patch);
  if ('notifyAt' in patch && item.notifiedFor && item.notifiedFor !== item.notifyAt) delete item.notifiedFor;
  normalizeTaskRange(item, key);
  save(STORAGE.data, data);
  mount();
  scheduleReminderCheck();
  scheduleAutoBackup('meta');
}

function commitTaskSchedule(originKey, id, patch) {
  const arr = data[originKey] || [];
  const idx = arr.findIndex(t => t.id === id);
  if (idx < 0) return;
  const item = arr[idx];
  const targetKey = toDateInputValue(patch.startDate) || originKey;
  delete patch.startDate;
  Object.assign(item, patch);
  if ('notifyAt' in patch && item.notifiedFor && item.notifiedFor !== item.notifyAt) delete item.notifiedFor;
  normalizeTaskRange(item, targetKey);
  if (targetKey !== originKey) {
    arr.splice(idx, 1);
    if (!arr.length) delete data[originKey];
    if (!data[targetKey]) data[targetKey] = [];
    data[targetKey].push(item);
  }
  save(STORAGE.data, data);
  mount();
  scheduleReminderCheck();
  scheduleAutoBackup('schedule');
}

function openMetaEditor(originKey, id) {
  const ref = findTaskRef(originKey, id);
  if (!ref) return;
  metaState = { originKey, id };
  document.getElementById('meta-title').textContent = ref.task.text || 'Task schedule';
  document.getElementById('meta-start').value = originKey;
  document.getElementById('meta-end').value = toDateInputValue(ref.task.endDate);
  document.getElementById('meta-end').min = originKey;
  document.getElementById('meta-deadline').value = toDateInputValue(ref.task.deadlineDate);
  document.getElementById('meta-notify').value = toDateTimeInputValue(ref.task.notifyAt);
  document.getElementById('meta-backdrop').classList.add('open');
  document.getElementById('meta-modal').classList.add('open');
  document.body.classList.add('modal-open');
  setTimeout(() => document.getElementById('meta-start').focus(), 80);
}

function closeMetaEditor() {
  metaState = null;
  document.getElementById('meta-backdrop').classList.remove('open');
  document.getElementById('meta-modal').classList.remove('open');
  document.body.classList.remove('modal-open');
}

function saveMetaEditor() {
  if (!metaState) return;
  const state = metaState;
  const startDate = toDateInputValue(document.getElementById('meta-start').value) || metaState.originKey;
  const patch = {
    startDate,
    endDate: toDateInputValue(document.getElementById('meta-end').value),
    deadlineDate: toDateInputValue(document.getElementById('meta-deadline').value),
    notifyAt: toDateTimeInputValue(document.getElementById('meta-notify').value),
  };
  closeMetaEditor();
  commitTaskSchedule(state.originKey, state.id, patch);
}
function placeCaretAtEnd(el) {
  const range = document.createRange();
  range.selectNodeContents(el);
  range.collapse(false);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
}

function toggleDayOpen(key) {
  const dayEl = document.querySelector(`.day[data-key="${key}"]`);
  if (!dayEl || dayEl.classList.contains('today')) return;
  if (openDays.has(key)) { openDays.delete(key); dayEl.classList.remove('open'); }
  else                   { openDays.add(key);    dayEl.classList.add('open'); }
}

/* ====================== Leftovers UI ====================== */
function handleLeftoverMove(id) {
  const yesterday = new Date(today.getFullYear(), today.getMonth(), today.getDate() - 1);
  const yKey = dateKey(yesterday);
  const leftover = (data[yKey] || []).find(t => t.id === id);
  if (!leftover) return;
  moveLeftoverToToday(leftover);
  removeLeftoverEl(id);
  showToast('Moved to today');
  // Re-mount so today's task list reflects new task
  mount();
}
function handleLeftoverSkip(id) {
  dismissLeftover(id);
  removeLeftoverEl(id);
}
function removeLeftoverEl(id) {
  const el = document.querySelector(`.leftover[data-leftover-id="${id}"]`);
  if (!el) return;
  el.classList.add('exiting');
  setTimeout(() => {
    el.remove();
    // If no leftovers left, remove the whole section
    const wrap = document.querySelector('.leftovers');
    if (wrap && !wrap.querySelector('.leftover')) wrap.remove();
  }, 280);
}
function handleLeftoversMoveAll() {
  const leftovers = getLeftovers();
  leftovers.forEach(t => moveLeftoverToToday(t));
  showToast(`Moved ${leftovers.length} task${leftovers.length === 1 ? '' : 's'} to today`);
  mount();
}

/* ====================== Event delegation ====================== */
function bindAppEvents() {
  const quickCapture = document.getElementById('quick-capture');
  if (quickCapture) {
    const captureTask = () => {
      const input = quickCapture.querySelector('input');
      const txt = input.value.trim();
      if (!txt) return;
      addInboxTask(txt);
      setTimeout(() => {
        const nextInput = document.querySelector('#quick-capture input');
        if (nextInput) { nextInput.value = ''; nextInput.focus(); }
      }, 0);
    };
    quickCapture.addEventListener('submit', e => {
      e.preventDefault();
      captureTask();
    });
    quickCapture.querySelector('input').addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        captureTask();
      }
    });
  }
  document.querySelectorAll('.agenda-day').forEach(btn => {
    btn.addEventListener('click', () => {
      if (selectedAgendaKey === btn.dataset.key) return;
      const track = btn.closest('.agenda-tab-track');
      if (track) {
        const tabs = Array.from(track.querySelectorAll('.agenda-day'));
        track.style.setProperty('--agenda-index', Math.max(0, tabs.indexOf(btn)));
        tabs.forEach(tab => {
          const isOn = tab === btn;
          tab.classList.toggle('on', isOn);
          tab.setAttribute('aria-pressed', isOn ? 'true' : 'false');
        });
      }
      setTimeout(() => {
        selectedAgendaKey = btn.dataset.key;
        mount();
      }, 190);
    });
  });
  document.querySelectorAll('.week-plan-day').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedAgendaKey = btn.dataset.key;
      settings.viewMode = 'agenda';
      settings.onlyNext7 = false;
      saveSettings();
      mount();
    });
  });
  document.querySelectorAll('.inbox-item').forEach(item => {
    const id = item.dataset.inboxId;
    const textEl = item.querySelector('[data-action="inbox-edit"]');
    textEl.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); textEl.blur(); }
    });
    textEl.addEventListener('blur', () => commitInboxEdit(id, textEl.textContent));
    item.addEventListener('click', e => {
      const btn = e.target.closest('button[data-action]');
      if (!btn) return;
      e.stopPropagation();
      if (btn.dataset.action === 'inbox-today') moveInboxTask(id, dateKey(today));
      if (btn.dataset.action === 'inbox-tomorrow') {
        const tomorrow = new Date(today.getFullYear(), today.getMonth(), today.getDate() + 1);
        moveInboxTask(id, dateKey(tomorrow));
      }
      if (btn.dataset.action === 'inbox-delete') deleteInboxTask(id);
    });
  });
  document.querySelectorAll('.day-header').forEach(h => {
    h.addEventListener('click', () => toggleDayOpen(h.dataset.key));
  });
  document.querySelectorAll('.task-item').forEach(bindTaskEvents);
  document.querySelectorAll('.add-task').forEach(form => {
    const submitTask = () => {
      const input = form.querySelector('input');
      const txt = input.value.trim();
      if (!txt) return;
      addTask(form.dataset.key, txt);
      // Re-find the input in case mount() rebuilt the DOM
      setTimeout(() => {
        const newInput = document.querySelector(`.add-task[data-key="${form.dataset.key}"] input`);
        if (newInput) { newInput.value = ''; newInput.focus(); }
      }, 0);
    };
    form.addEventListener('submit', e => {
      e.preventDefault();
      submitTask();
    });
    form.querySelector('input').addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        submitTask();
      }
    });
  });
  // Leftovers actions (event delegation since they live inside the day inner)
  document.querySelectorAll('.leftovers').forEach(el => {
    el.addEventListener('click', e => {
      const btn = e.target.closest('button[data-action]');
      if (!btn) return;
      e.stopPropagation();
      const action = btn.dataset.action;
      const id = btn.dataset.leftoverId;
      if (action === 'leftover-move') handleLeftoverMove(id);
      else if (action === 'leftover-skip') handleLeftoverSkip(id);
      else if (action === 'leftovers-move-all') handleLeftoversMoveAll();
    });
  });
}

function bindTaskEvents(itemEl) {
  const key = itemEl.dataset.originKey || itemEl.dataset.key;
  const id  = itemEl.dataset.id;

  // Checkbox
  itemEl.querySelector('[data-action="toggle"]').addEventListener('click', e => {
    e.stopPropagation();
    toggleTask(key, id);
  });
  // Delete
  itemEl.querySelector('[data-action="delete"]').addEventListener('click', e => {
    e.stopPropagation();
    deleteTask(key, id);
  });
  // Note button
  itemEl.querySelector('[data-action="note"]').addEventListener('click', e => {
    e.stopPropagation();
    toggleNoteEditor(key, id);
  });
  itemEl.querySelector('[data-action="meta"]').addEventListener('click', e => {
    e.stopPropagation();
    toggleMetaEditor(key, id);
  });
  itemEl.querySelector('[data-action="snooze"]').addEventListener('click', e => {
    e.stopPropagation();
    snoozeTask(key, id, itemEl.dataset.key);
  });
  // Text edit
  const textEl = itemEl.querySelector('[data-action="edit"]');
  textEl.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); textEl.blur(); }
  });
  textEl.addEventListener('blur', () => commitEdit(key, id, textEl.textContent));
  // Note edit
  const noteEl = itemEl.querySelector('[data-action="edit-note"]');
  noteEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); noteEl.blur(); }
  });
  noteEl.addEventListener('blur', () => {
    commitNoteEdit(key, id, noteEl.textContent);
    if (!noteEl.textContent.trim()) noteEl.classList.remove('editing');
  });
  // Gestures
  attachGestures(itemEl);
}

/* ====================== Gesture engine: swipe + drag-reorder ====================== */
const gesture = { state: null }; // { state, taskItem, taskEl, wrapEl, startX, startY, dx, dy, longPressTimer, originalIndex, newIndex, taskHeight }

function attachGestures(itemEl) {
  const taskEl = itemEl.querySelector('.task');
  const wrapEl = itemEl.querySelector('.task-wrap');
  taskEl.addEventListener('pointerdown', onPointerDown);
  function onPointerDown(e) {
    if (e.button !== undefined && e.button !== 0) return;
    if (e.target.closest('.checkbox, .task-delete, .task-note-btn, .task-meta-btn, input, button')) return;
    gesture.state = 'tracking';
    gesture.taskItem = itemEl;
    gesture.taskEl = taskEl;
    gesture.wrapEl = wrapEl;
    gesture.startX = e.clientX;
    gesture.startY = e.clientY;
    gesture.dx = 0;
    gesture.dy = 0;
    gesture.pointerId = e.pointerId;
    gesture.longPressTimer = setTimeout(enterDragMode, 430);
    try { taskEl.setPointerCapture(e.pointerId); } catch {}
    taskEl.addEventListener('pointermove', onPointerMove);
    taskEl.addEventListener('pointerup', onPointerEnd);
    taskEl.addEventListener('pointercancel', onPointerEnd);
  }
}

function enterDragMode() {
  if (!gesture.state || gesture.state !== 'tracking') return;
  gesture.state = 'drag';
  try { gesture.taskEl.setPointerCapture(gesture.pointerId); } catch {}
  gesture.taskEl.classList.add('dragging');
  gesture.taskItem.classList.add('dragging-active');
  const rect = gesture.taskItem.getBoundingClientRect();
  gesture.taskHeight = rect.height;
  const tasksEl = gesture.taskItem.parentNode;
  gesture.originalIndex = Array.from(tasksEl.children).indexOf(gesture.taskItem);
  gesture.newIndex = gesture.originalIndex;
  gesture.targetDayKey = gesture.taskItem.dataset.key;
  setDragTarget(gesture.targetDayKey);
}

function onPointerMove(e) {
  if (!gesture.state) return;
  const dx = e.clientX - gesture.startX;
  const dy = e.clientY - gesture.startY;
  gesture.dx = dx;
  gesture.dy = dy;

  if (gesture.state === 'tracking') {
    if (Math.abs(dx) > 8 || Math.abs(dy) > 8) {
      clearTimeout(gesture.longPressTimer);
      if (Math.abs(dy) > Math.abs(dx)) {
        // vertical scroll, abort gesture
        cleanupGesture();
        return;
      } else {
        gesture.state = 'swipe';
        try { gesture.taskEl.setPointerCapture(gesture.pointerId); } catch {}
      }
    }
  }

  if (gesture.state === 'swipe') {
    e.preventDefault();
    gesture.taskEl.style.transform = `translateX(${dx}px)`;
    gesture.wrapEl.classList.toggle('swiping-right', dx > 0);
    gesture.wrapEl.classList.toggle('swiping-left',  dx < 0);
  } else if (gesture.state === 'drag') {
    e.preventDefault();
    gesture.taskEl.style.transform = `translate(${dx}px, ${dy}px) scale(1.04)`;
    updateDragTarget(e.clientX, e.clientY);
    updateDragSiblings();
  }
}

function updateDragTarget(x, y) {
  const previous = gesture.taskEl.style.pointerEvents;
  gesture.taskEl.style.pointerEvents = 'none';
  const dayEl = document.elementFromPoint(x, y)?.closest('.day');
  gesture.taskEl.style.pointerEvents = previous;
  if (!dayEl) return;
  const key = dayEl.dataset.key;
  if (key && key !== gesture.targetDayKey) {
    gesture.targetDayKey = key;
    setDragTarget(key);
  }
}

function setDragTarget(key) {
  document.querySelectorAll('.day.drag-target').forEach(el => el.classList.remove('drag-target'));
  const dayEl = document.querySelector(`.day[data-key="${key}"]`);
  if (dayEl) dayEl.classList.add('drag-target');
}

function updateDragSiblings() {
  const tasksEl = gesture.taskItem.parentNode;
  const items = Array.from(tasksEl.children);
  const taskH = gesture.taskHeight || 1;
  let newIndex = gesture.originalIndex + Math.round(gesture.dy / taskH);
  newIndex = Math.max(0, Math.min(items.length - 1, newIndex));
  gesture.newIndex = newIndex;
  items.forEach((it, i) => {
    if (it === gesture.taskItem) return;
    if (gesture.originalIndex < newIndex && i > gesture.originalIndex && i <= newIndex) {
      it.style.transform = `translateY(-${taskH}px)`;
    } else if (gesture.originalIndex > newIndex && i < gesture.originalIndex && i >= newIndex) {
      it.style.transform = `translateY(${taskH}px)`;
    } else {
      it.style.transform = '';
    }
  });
}

function onPointerEnd(e) {
  if (!gesture.state) { cleanupGesture(); return; }
  clearTimeout(gesture.longPressTimer);

  if (gesture.state === 'swipe') {
    const threshold = 56;
    if (gesture.dx > threshold) {
      // swipe-right = mark done
      const key = gesture.taskItem.dataset.originKey || gesture.taskItem.dataset.key;
      const id  = gesture.taskItem.dataset.id;
      const ref = findTaskRef(key, id);
      const item = ref && ref.task;
      if (item && !item.done) toggleTask(key, id);
      snapBack();
    } else if (gesture.dx < -threshold) {
      // swipe-left = move to tomorrow
      const key = gesture.taskItem.dataset.originKey || gesture.taskItem.dataset.key;
      const id  = gesture.taskItem.dataset.id;
      const fromKey = gesture.taskItem.dataset.key;
      gesture.taskEl.style.transform = `translateX(-100%)`;
      setTimeout(() => snoozeTask(key, id, fromKey), 90);
      cleanupGesture();
      return;
    } else {
      snapBack();
    }
  } else if (gesture.state === 'drag') {
    commitReorder();
  } else {
    cleanupGesture();
    return;
  }
  cleanupGesture();
}

function snapBack() {
  if (!gesture.taskEl) return;
  gesture.taskEl.style.transform = '';
  gesture.wrapEl.classList.remove('swiping-right', 'swiping-left');
}

function commitReorder() {
  const item = gesture.taskItem;
  const tasksEl = item.parentNode;
  const items = Array.from(tasksEl.children);
  const oldIdx = gesture.originalIndex;
  const newIdx = gesture.newIndex;
  const displayKey = item.dataset.key;
  const originKey = item.dataset.originKey || displayKey;
  const targetKey = gesture.targetDayKey || displayKey;
  const taskId = item.dataset.id;
  // Reset transforms
  items.forEach(it => it.style.transform = '');
  document.querySelectorAll('.day.drag-target').forEach(el => el.classList.remove('drag-target'));
  gesture.taskEl.classList.remove('dragging');
  gesture.taskEl.style.transform = '';
  if (targetKey !== displayKey) {
    moveTaskToDay(originKey, taskId, targetKey);
    showToast('Task moved');
  } else if (oldIdx !== newIdx) {
    const arr = data[originKey] || [];
    const i = arr.findIndex(t => t.id === taskId);
    if (i >= 0) {
      const moved = arr.splice(i, 1)[0];
      arr.splice(Math.max(0, Math.min(newIdx, arr.length)), 0, moved);
      save(STORAGE.data, data);
      scheduleAutoBackup('reorder');
    }
    rerenderDay(displayKey);
  }
  if (item) item.classList.remove('dragging-active');
}

function moveTaskToDay(originKey, id, targetKey) {
  const arr = data[originKey] || [];
  const idx = arr.findIndex(t => t.id === id);
  if (idx < 0) return;
  const moved = arr.splice(idx, 1)[0];
  if (!arr.length) delete data[originKey];
  if (!data[targetKey]) data[targetKey] = [];
  normalizeTaskRange(moved, targetKey);
  const reminder = toDateTimeInputValue(moved.notifyAt);
  if (reminder) moved.notifyAt = `${targetKey}T${reminder.split('T')[1]}`;
  data[targetKey].push(moved);
  save(STORAGE.data, data);
  mount();
  scheduleAutoBackup('move');
}

function snoozeTask(originKey, id, fromKey = dateKey(today)) {
  const targetKey = dateKey(addDays(parseDateKey(fromKey || dateKey(today)), 1));
  const itemEls = Array.from(document.querySelectorAll(`.task-item[data-origin-key="${originKey}"][data-id="${id}"]`));
  itemEls.forEach(el => el.classList.add('micro-move'));
  setTimeout(() => {
    moveTaskToDay(originKey, id, targetKey);
    showToast(`Moved to ${relativeDayLabel(targetKey)}`);
  }, 180);
}

function cleanupGesture() {
  if (gesture.taskEl) {
    gesture.taskEl.removeEventListener('pointermove', onPointerMove);
    gesture.taskEl.removeEventListener('pointerup', onPointerEnd);
    gesture.taskEl.removeEventListener('pointercancel', onPointerEnd);
    try { gesture.taskEl.releasePointerCapture(gesture.pointerId); } catch {}
  }
  if (gesture.wrapEl) gesture.wrapEl.classList.remove('swiping-right', 'swiping-left');
  if (gesture.taskItem) gesture.taskItem.classList.remove('dragging-active');
  document.querySelectorAll('.day.drag-target').forEach(el => el.classList.remove('drag-target'));
  gesture.state = null;
  gesture.taskItem = null;
  gesture.taskEl = null;
  gesture.wrapEl = null;
}

function rerenderDay(key) {
  const dayEl = document.querySelector(`.day[data-key="${key}"]`);
  if (!dayEl) return;
  const tasksEl = dayEl.querySelector('.tasks');
  if (!tasksEl) return;
  const list = getTaskRefsForDay(key);
  tasksEl.innerHTML = list.map(ref => taskHTML(ref.task, key, ref.originKey)).join('');
  tasksEl.querySelectorAll('.task-item').forEach(bindTaskEvents);
  updateDayMeta(key);
}

/* ====================== Settings panel ====================== */
const panel = document.getElementById('settings');
const backdrop = document.getElementById('backdrop');

function renderDayToggles() {
  const order = [1,2,3,4,5,6,0];
  const container = document.getElementById('day-toggles');
  container.innerHTML = order.map(idx => {
    const on = settings.visibleDays.includes(idx);
    return `
      <div class="toggle-row" data-day-idx="${idx}">
        <span>${DAYS_FULL[idx]}</span>
        <div class="switch ${on ? 'on' : ''}"></div>
      </div>
    `;
  }).join('');
  container.querySelectorAll('.toggle-row').forEach(row => {
    row.addEventListener('click', () => {
      const idx = Number(row.dataset.dayIdx);
      const on = settings.visibleDays.includes(idx);
      if (on) settings.visibleDays = settings.visibleDays.filter(x => x !== idx);
      else    settings.visibleDays = [...settings.visibleDays, idx].sort((a,b)=>a-b);
      saveSettings();
      row.querySelector('.switch').classList.toggle('on');
      mount();
    });
  });

function renderNotificationsSwitch() {

async function requestNotificationPermission() {
  if (!('Notification' in window)) {
    showToast('Notifications are not supported here');
    return false;
  }
  if (Notification.permission === 'granted') return true;
  if (Notification.permission === 'denied') {
    showToast('Notifications are blocked in browser settings');
    return false;
  }
  const result = await Notification.requestPermission();
  return result === 'granted';
}

function templatePreviewDates(tpl, count = 5) {
  const start = stripTime(today);
  const dates = [];
  for (let i = 0; i < 42 && dates.length < count; i++) {
    const d = addDays(start, i);
    const k = dateKey(d);
    if (tpl.endDate && compareDateKeys(k, tpl.endDate) > 0) break;
    if (getTemplateDates(tpl, [d], start).length) dates.push(d);
  }
  return dates;
}

function templatePreviewHTML(tpl) {
  const dates = templatePreviewDates(tpl);
  if (!dates.length) return '<span>No upcoming dates</span>';
  return dates.map(d => `<span>${DAYS_SHORT[d.getDay()]} ${d.getDate()}</span>`).join('');
}

function renderRecurringList() {
  const container = document.getElementById('recur-list');

        <button class="recur-delete" data-action="recur-delete" title="Delete">${ICON_TRASH}</button>
      </div>
      <div class="recur-mode">

          <button class="${templateRepeatMode(tpl) === mode ? 'on' : ''}" data-action="recur-mode" data-repeat-mode="${mode}">${label}</button>

      </div>
      <div class="day-chips" data-mode-field="weekly">

      </div>

        <label>Until
          <input type="date" data-action="recur-end" value="${toDateInputValue(tpl.endDate)}">
        </label>
        <label>Notify
          <input type="time" data-action="recur-reminder" value="${toTimeInputValue(tpl.reminderTime)}">
        </label>
        <label data-mode-field="interval">Start
          <input type="date" data-action="recur-start" value="${toDateInputValue(tpl.startDate) || dateKey(today)}">
        </label>
        <label data-mode-field="interval">Every days
          <input type="number" min="1" max="365" step="1" inputmode="numeric" data-action="recur-interval" value="${clampNumber(tpl.intervalDays || 2, 1, 365)}">
        </label>
        <label data-mode-field="monthly">Day
          <input type="number" min="1" max="31" step="1" inputmode="numeric" data-action="recur-month-day" value="${clampNumber(tpl.monthDay || today.getDate(), 1, 31)}">
        </label>
      </div>

    textInput.addEventListener('blur', () => {

      syncTemplateFuture(tplId);

      syncTemplateFuture(tplId);

      syncTemplateFuture(tplId);

    });
  });

function syncTemplateFuture(tplId) {
  const start = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  Object.keys(data).forEach(k => {
    const d = parseDateKey(k);
    if (d < start) return;
    data[k] = (data[k] || []).filter(t => t.templateId !== tplId);
    if (!data[k].length) delete data[k];
  });
  save(STORAGE.data, data);
  materializeRecurring();
  renderRecurringList();
  mount();
  scheduleAutoBackup('template');
}

function deleteTemplate(id) {
  templates = templates.filter(t => t.id !== id);
  save(STORAGE.templates, templates);
  // Remove already-materialized future instances for this template (today onward)
  const start = new Date(today.getFullYear(), today.getMonth(), today.getDate());
  Object.keys(data).forEach(k => {
    const d = parseDateKey(k);
    if (d < start) return;
    data[k] = (data[k] || []).filter(t => t.templateId !== id);
    if (!data[k].length) delete data[k];
  });
  save(STORAGE.data, data);
  renderRecurringList();
  mount();
  scheduleAutoBackup('template-delete');
}

function addTemplate() {
  const tpl = { id: uid(), text: 'New repeating task', repeatMode: 'weekly', days: [1,2,3,4,5], note: '', endDate: '', reminderTime: '', startDate: dateKey(today), intervalDays: 2, monthDay: today.getDate() };
  templates.push(tpl);
  save(STORAGE.templates, templates);
  renderRecurringList();
  // Focus the new template's input
  setTimeout(() => {
    const input = document.querySelector(`.recur-template[data-tpl-id="${tpl.id}"] input`);
    if (input) { input.focus(); input.select(); }
  }, 50);
  materializeRecurring();
  mount();
  scheduleAutoBackup('template-add');
}

/* ====================== Backups ====================== */
let autoBackupTimer = null;

function backupLabel(iso) {
  if (!iso) return 'No local backup yet';
  const d = new Date(iso);
  if (Number.isNaN(d.getTime())) return 'No local backup yet';
  return `Last local backup: ${MONTHS_EN[d.getMonth()]} ${d.getDate()} · ${formatTime(d)}`;
}

function renderBackupMeta() {
  const el = document.getElementById('backup-meta');
  if (!el) return;
  el.textContent = backupLabel(backups[0]?.exportedAt);
}

function createLocalBackup(reason = 'auto', force = false) {
  const last = backups[0];
  const now = Date.now();
  if (!force && last?.exportedAt && now - new Date(last.exportedAt).getTime() < 5 * 60000) return;
  backups = [appSnapshot(reason), ...backups].slice(0, 8);
  save(STORAGE.backups, backups);
  renderBackupMeta();
}

function scheduleAutoBackup(reason = 'auto') {
  clearTimeout(autoBackupTimer);
  autoBackupTimer = setTimeout(() => createLocalBackup(reason), 1200);
}

function downloadBackup(snapshot = appSnapshot('manual')) {
  const blob = new Blob([JSON.stringify(snapshot, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `daily-tasks-backup-${dateKey(new Date())}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

async function copyBackup() {
  const text = JSON.stringify(appSnapshot('clipboard'), null, 2);
  try {
    await navigator.clipboard.writeText(text);
    showToast('Backup copied');
  } catch {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.setAttribute('readonly', '');
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    showToast(ok ? 'Backup copied' : 'Copy unavailable');
  }
}

function applyImportedBackup(obj) {
  if (!obj || typeof obj !== 'object') throw new Error('Invalid format');
  createLocalBackup('pre-import', true);
  if (obj.data && typeof obj.data === 'object')      { data = obj.data; save(STORAGE.data, data); }
  if (Array.isArray(obj.inbox))                      { inbox = obj.inbox; save(STORAGE.inbox, inbox); }
  if (Array.isArray(obj.templates))                  { templates = obj.templates; save(STORAGE.templates, templates); }
  if (obj.dismissed && typeof obj.dismissed === 'object') { dismissed = obj.dismissed; save(STORAGE.dismissed, dismissed); }
  if (obj.settings && typeof obj.settings === 'object') {
    settings = Object.assign({ visibleDays: [0,1,2,3,4,5,6], showLeftovers: true, theme: 'dark', notifications: false, viewMode: 'list', onlyNext7: false }, obj.settings);
    if (!['list', 'agenda', 'undated', 'week'].includes(settings.viewMode)) settings.viewMode = 'list';
    saveSettings();
  }
  createLocalBackup('imported', true);
}

function refreshSettingsPanel() {
  if (!panel.classList.contains('open')) return;
  renderDayToggles();
  renderThemeSwitch();
  renderNotificationsSwitch();
  renderLeftoversSwitch();
  renderRecurringList();

/* ====================== Reminder notifications ====================== */
let reminderTimer = null;

function getAllTaskRefs() {
  return Object.keys(data).flatMap(originKey => (data[originKey] || []).map(task => ({ task, originKey })));
}

function notificationTime(task) {
  const value = toDateTimeInputValue(task.notifyAt);
  if (!value) return null;
  const dt = new Date(value);
  return Number.isNaN(dt.getTime()) ? null : dt;
}

async function showTaskNotification(task) {
  if (!settings.notifications) return false;
  if (!('Notification' in window) || Notification.permission !== 'granted') return false;
  const options = {
    body: task.note || 'Daily Tasks reminder',
    tag: `daily-task-${task.id}-${task.notifyAt}`,
    renotify: true,
    icon: './icon-192.png',
  };
  try {
    if ('serviceWorker' in navigator) {
      const reg = await navigator.serviceWorker.getRegistration();
      if (reg && reg.showNotification) {
        await reg.showNotification(task.text, options);
        return true;
      }
    }
    new Notification(task.text, options);
    return true;
  } catch {
    return false;
  }
}

async function checkDueReminders() {
  if (!settings.notifications) return;
  const now = Date.now();
  let changed = false;
  for (const { task } of getAllTaskRefs()) {
    if (task.done || !task.notifyAt || task.notifiedFor === task.notifyAt) continue;
    const dt = notificationTime(task);
    if (!dt || dt.getTime() > now) continue;
    const shown = await showTaskNotification(task);
    if (shown) {
      task.notifiedFor = task.notifyAt;
      changed = true;
    }
  }
  if (changed) save(STORAGE.data, data);
}

function scheduleReminderCheck() {
  clearInterval(reminderTimer);
  checkDueReminders();
  reminderTimer = setInterval(checkDueReminders, 30000);
}

  e.preventDefault();
  deferredInstallPrompt = e;
  renderInstallPrompt();
});
window.addEventListener('appinstalled', () => {
  deferredInstallPrompt = null;
  localStorage.setItem('daily-tasks-install-dismissed-v1', 'true');
  renderInstallPrompt();
  showAppStatus('Installed on this device', 'ready');
});
document.getElementById('install-confirm')?.addEventListener('click', async () => {
  if (!deferredInstallPrompt) return;
  const promptEvent = deferredInstallPrompt;
  deferredInstallPrompt = null;
  renderInstallPrompt();
  promptEvent.prompt();
  try { await promptEvent.userChoice; } catch {}
});
document.getElementById('install-dismiss')?.addEventListener('click', () => {
  localStorage.setItem('daily-tasks-install-dismissed-v1', 'true');
  renderInstallPrompt();
});
if (!navigator.onLine) showAppStatus('Offline mode · tasks keep working', 'offline', 4200);

/* ====================== Service worker ====================== */
if ('serviceWorker' in navigator && location.protocol !== 'file:') {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(() => navigator.serviceWorker.ready)
      .then(() => showAppStatus('Offline ready', 'ready', 1800))
      .catch(() => showAppStatus('Offline cache unavailable', 'offline', 3200));
  });
}

/* ====================== Seed example tasks on first run ====================== */
if (!Object.keys(data).length && !templates.length) {
  const k = dateKey(new Date());
  data[k] = [
    { id: uid(), text: '5km run',             done: true,  note: '' },
    { id: uid(), text: 'Read 10 pages',       done: false, note: '' },
    { id: uid(), text: 'Walk the dog',        done: false, note: '' },
    { id: uid(), text: 'Get groceries',       done: false, note: '' },
    { id: uid(), text: 'Design a to-do app (?)', done: false, note: '' },
  ];
  save(STORAGE.data, data);
}

mount();
scheduleReminderCheck();
createLocalBackup('startup');
setInterval(() => createLocalBackup('interval'), 6 * 60 * 60000);
</script>
</body>
</html>
